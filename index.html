<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubrik HBP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f0f4f8;
    --surface:   #ffffff;
    --border:    #dde3ea;
    --primary:   #1a5cad;
    --primary-d: #134a8e;
    --accent:    #00b377;
    --warn:      #e8a020;
    --danger:    #d93025;
    --text:      #1a2433;
    --sub:       #5a6a7a;
    --muted:     #8a99aa;
    --radius:    12px;
    --shadow:    0 2px 12px rgba(0,0,0,.08);
    --shadow-md: 0 4px 24px rgba(0,0,0,.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top Bar ── */
  .topbar {
    background: var(--primary);
    color: #fff;
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(26,92,173,.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-brand .logo {
    width: 32px; height: 32px; background: rgba(255,255,255,.2);
    border-radius: 8px; display: grid; place-items: center; font-size: 18px;
  }
  .topbar-brand h1 { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .topbar-brand span { font-size: 12px; opacity: .7; margin-left: 4px; font-weight: 500; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn-icon {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-family: inherit; transition: background .2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,.28); }

  /* ── Layout ── */
  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-label { font-size: 10px; font-weight: 700; color: var(--muted);
    letter-spacing: 1px; padding: 8px 10px 4px; text-transform: uppercase; }
  .kelas-btn {
    width: 100%; text-align: left; padding: 9px 14px;
    border: none; background: none; border-radius: 8px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--sub); cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .kelas-btn:hover { background: var(--bg); color: var(--text); }
  .kelas-btn.active { background: #e8f0fc; color: var(--primary); font-weight: 700; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; background: var(--accent); color: #fff; min-width: 22px;
    text-align: center;
  }
  .badge.warn { background: var(--warn); }
  .badge.muted { background: var(--border); color: var(--sub); }

  /* ── Main ── */
  .main { flex: 1; padding: 28px; overflow-y: auto; }

  /* ── Dashboard Cards ── */
  .dash-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .dash-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    cursor: pointer; transition: all .18s;
  }
  .dash-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
  .dash-card h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--sub); }
  .dash-card .progress-row { display: flex; align-items: center; gap: 8px; }
  .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
  .progress-fill.partial { background: var(--warn); }
  .progress-fill.empty { background: var(--border); }
  .dash-card .pct { font-size: 13px; font-weight: 700; color: var(--text); min-width: 36px; text-align: right; }
  .dash-card .counts { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── Section Header ── */
  .section-hd {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-hd h2 { font-size: 18px; font-weight: 800; color: var(--text); }
  .section-hd p { font-size: 13px; color: var(--sub); margin-top: 2px; }

  /* ── Toolbar ── */
  .toolbar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .toolbar-group { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; }
  input, select {
    font-family: inherit; font-size: 13px; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 7px 12px; background: var(--surface); outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--primary); }
  input[type="number"] { width: 70px; font-family: 'DM Mono', monospace; text-align: center; }
  .btn {
    padding: 8px 18px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .18s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-d); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-success { background: var(--accent); color: #fff; }
  .btn-success:hover { filter: brightness(1.1); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ── Rubrik Table ── */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #f5f7fa; border-bottom: 2px solid var(--border);
    padding: 11px 16px; text-align: left; font-size: 11px;
    font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .5px;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfd; }
  td { padding: 10px 16px; font-size: 13px; vertical-align: middle; }
  td.no { color: var(--muted); font-size: 12px; width: 36px; }
  td.nama { font-weight: 600; }
  td.jantina { font-size: 12px; color: var(--sub); width: 70px; }
  .hadir-cell { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; }
  .hadir-cell span { color: var(--muted); font-size: 14px; }

  /* Sahsiah toggle */
  .sahsiah-group { display: flex; gap: 6px; }
  .sah-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    font-family: inherit; font-size: 11px; font-weight: 700;
    cursor: pointer; background: none; color: var(--sub); transition: all .15s;
  }
  .sah-btn.SB.active { background: #e8f9f2; border-color: var(--accent); color: var(--accent); }
  .sah-btn.B.active  { background: #e8f0fc; border-color: var(--primary); color: var(--primary); }
  .sah-btn.SD.active { background: #fef4e4; border-color: var(--warn); color: var(--warn); }

  td.status { width: 40px; text-align: center; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); display: inline-block; }
  .status-dot.done { background: var(--accent); }

  /* ── Bulk Bar ── */
  .bulk-bar {
    background: #e8f0fc; border: 1.5px solid #b8cef0;
    border-radius: 10px; padding: 12px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px; font-size: 13px; font-weight: 600; color: var(--primary);
  }
  .bulk-bar .bulk-fields { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* ── Empty / Loading ── */
  .state-box {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .state-box .icon { font-size: 48px; margin-bottom: 12px; }
  .state-box p { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--sub); }
  .state-box small { font-size: 13px; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a2433; color: #fff;
    padding: 12px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow-md); z-index: 999;
    transform: translateY(80px); opacity: 0;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    display: flex; align-items: center; gap: 8px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-left: 4px solid var(--accent); }
  #toast.error   { border-left: 4px solid var(--danger); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 200; display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 16px;
    padding: 28px; width: 460px; max-width: 96vw;
    box-shadow: var(--shadow-md); animation: popIn .25s ease;
  }
  @keyframes popIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
  .modal p  { font-size: 13px; color: var(--sub); margin-bottom: 18px; }
  .modal .field { margin-bottom: 14px; }
  .modal .field label { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .modal .field input { width: 100%; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* ── Print ── */
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: fixed; inset: 0; background: #fff; z-index: 9999; padding: 0; }
    .print-page {
      page-break-after: always; padding: 20mm 15mm;
      font-family: Arial, sans-serif;
    }
    .print-page:last-child { page-break-after: avoid; }
  }

  /* Print Preview Modal */
  #print-area {
    display: none;
    position: fixed; inset: 0; background: #fff; z-index: 500;
    overflow-y: auto; padding: 40px;
  }
  #print-area.open { display: block; }
  .print-controls {
    display: flex; gap: 10px; margin-bottom: 24px; justify-content: center;
  }
  @media print { .print-controls { display: none; } }
  .print-page {
    width: 210mm; min-height: 148mm; margin: 0 auto 24px;
    border: 1px solid #ccc; padding: 16mm 14mm; background: #fff;
    font-family: Arial, sans-serif;
  }
  .print-title { text-align: center; margin-bottom: 14px; }
  .print-title p { font-size: 12pt; font-weight: bold; line-height: 1.5; }
  .print-meta { margin-bottom: 14px; }
  .print-meta .meta-row {
    display: flex; align-items: flex-end; gap: 4px;
    font-size: 10pt; margin-bottom: 6px; font-weight: bold;
  }
  .print-meta .meta-row .label { min-width: 90px; }
  .print-meta .meta-row .line { flex: 1; border-bottom: 1.5px solid #000; }
  .print-table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
  .print-table th, .print-table td {
    border: 1.5px solid #000; padding: 8px 12px;
    font-size: 10pt; font-weight: bold; text-align: center;
  }
  .print-table .full { text-align: center; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">📋</div>
    <h1>Rubrik HBP 2026 <span>| Tahun 3</span></h1>
  </div>
  <div class="topbar-actions">
    <button class="btn-icon" onclick="openSettings()">⚙️ Tetapan GAS</button>
    <button class="btn-icon" onclick="loadDashboard()">🔄 Muat Semula</button>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Senarai Kelas</div>
    <button class="kelas-btn active" onclick="showDashboard(this)" data-kelas="">📊 Dashboard</button>
    <div id="kelas-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="state-box">
      <div class="icon">⏳</div>
      <p>Sedang memuatkan data...</p>
      <small>Sila tunggu sebentar.</small>
    </div>
  </main>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ Tetapan GAS</h2>
    <p>Masukkan URL Web App Google Apps Script anda. URL ini diperolehi selepas deploy GAS sebagai Web App.</p>
    <div class="field">
      <label>GAS Web App URL</label>
      <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeSettings()">Batal</button>
      <button class="btn btn-primary" onclick="saveSettings()">💾 Simpan</button>
    </div>
  </div>
</div>

<!-- Print Area -->
<div id="print-area">
  <div class="print-controls">
    <button class="btn btn-primary" onclick="window.print()">🖨️ Cetak</button>
    <button class="btn btn-secondary" onclick="closePrint()">✕ Tutup</button>
  </div>
  <div id="print-pages"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
const KELAS_LIST = [
  '3 Amanah','3 Bijak','3 Cemerlang','3 Dedikasi',
  '3 Efektif','3 Fokus','3 Gigih','3 Harmoni','3 Intelek'
];

let state = {
  gasUrl   : localStorage.getItem('hbp_gas_url') || '',
  kelas    : null,
  murid    : [],      // [{ nama, jantina }]
  rubrik   : {},      // { nama: { hadirHari, jumlahHari, sahsiah } }
  edits    : {},      // { nama: { hadirHari, jumlahHari, sahsiah } }
  guruKelas: localStorage.getItem('hbp_guru') || '',
  tarikh   : localStorage.getItem('hbp_tarikh') || new Date().toISOString().split('T')[0],
  dashboard: [],
  loading  : false,
};

// ── GAS API (JSONP — tiada CORS issue) ────────────────────
function api(action, extra = {}) {
  return new Promise((resolve, reject) => {
    if (!state.gasUrl) { toast('Sila tetapkan GAS URL dahulu.','error'); openSettings(); resolve(null); return; }

    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    let url = state.gasUrl + '?action=' + encodeURIComponent(action) + '&callback=' + cbName;
    if (extra.kelas) url += '&kelas=' + encodeURIComponent(extra.kelas);
    if (extra.data)  url += '&data='  + encodeURIComponent(JSON.stringify(extra.data));

    const timer = setTimeout(() => {
      cleanup();
      toast('Ralat: Request timeout. Semak URL GAS.', 'error');
      resolve(null);
    }, 15000);

    function cleanup() {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      clearTimeout(timer);
    }

    window[cbName] = function(data) {
      cleanup();
      if (!data.success) { toast('Ralat: ' + (data.error || 'Tidak diketahui'), 'error'); resolve(null); return; }
      resolve(data);
    };

    const script = document.createElement('script');
    script.id  = cbName;
    script.src = url;
    script.onerror = function() {
      cleanup();
      toast('Ralat: Gagal sambung ke GAS. Semak URL.', 'error');
      resolve(null);
    };
    document.head.appendChild(script);
  });
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  if (!state.gasUrl) { openSettings(); return; }
  loadDashboard();
});

function buildSidebar() {
  const el = document.getElementById('kelas-list');
  el.innerHTML = KELAS_LIST.map(k =>
    `<button class="kelas-btn" onclick="selectKelas(this,'${k}')" data-kelas="${k}">
      🏫 ${k}
      <span class="badge muted" id="badge-${k.replace(' ','-')}">—</span>
    </button>`
  ).join('');
}

// ── Dashboard ──────────────────────────────────────────────
async function loadDashboard() {
  const data = await api('getDashboard');
  if (!data) return;
  state.dashboard = data.stats;

  // update badges
  data.stats.forEach(s => {
    const badge = document.getElementById('badge-' + s.kelas.replace(' ','-'));
    if (!badge) return;
    badge.textContent = s.total > 0 ? `${s.siap}/${s.total}` : '—';
    badge.className = 'badge ' + (s.peratus === 100 ? '' : s.peratus > 0 ? 'warn' : 'muted');
  });

  if (!state.kelas) renderDashboard(data.stats);
}

function renderDashboard(stats) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div>
        <h2>📊 Dashboard</h2>
        <p>Semak status pengisian rubrik HBP bagi semua kelas.</p>
      </div>
    </div>
    <div class="dash-grid">
      ${stats.map(s => {
        const cls = s.peratus===100?'':'partial';
        return `<div class="dash-card" onclick="selectKelasFromDash('${s.kelas}')">
          <h3>${s.kelas}</h3>
          <div class="progress-row">
            <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${s.peratus}%"></div></div>
            <div class="pct">${s.peratus}%</div>
          </div>
          <div class="counts">${s.siap} / ${s.total} murid siap</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function showDashboard(btn) {
  setActive(btn);
  state.kelas = null;
  renderDashboard(state.dashboard);
}

function selectKelasFromDash(kelas) {
  const btn = [...document.querySelectorAll('.kelas-btn')].find(b => b.dataset.kelas === kelas);
  if (btn) selectKelas(btn, kelas);
}

// ── Kelas View ─────────────────────────────────────────────
async function selectKelas(btn, kelas) {
  setActive(btn);
  state.kelas = kelas;
  state.edits = {};
  renderLoading();

  const [mRes, rRes] = await Promise.all([
    api('getMurid', { kelas }),
    api('getRubrik', { kelas }),
  ]);
  if (!mRes) return;

  state.murid  = mRes.murid || [];
  state.rubrik = rRes ? rRes.rubrik || {} : {};

  // Prefill edits from saved rubrik
  state.murid.forEach(m => {
    const saved = state.rubrik[m.nama] || {};
    state.edits[m.nama] = {
      hadirHari : saved.hadirHari  ?? '',
      jumlahHari: saved.jumlahHari ?? '',
      sahsiah   : saved.sahsiah   || '',
    };
  });

  renderKelasView();
}

function renderLoading() {
  document.getElementById('main').innerHTML = `
    <div class="state-box"><div class="icon">⏳</div><p>Memuatkan data...</p></div>`;
}

function renderKelasView() {
  if (!state.murid.length) {
    document.getElementById('main').innerHTML = `
      <div class="state-box">
        <div class="icon">📭</div>
        <p>Tiada murid dalam kelas ${state.kelas}</p>
        <small>Sila import senarai murid ke Google Sheets (Sheet: Murid).</small>
      </div>`;
    return;
  }

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="section-hd">
      <div>
        <h2>🏫 ${state.kelas}</h2>
        <p>${state.murid.length} murid | Isi maklumat kehadiran dan sahsiah.</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="openPrint()">🖨️ Pratonton Cetak</button>
        <button class="btn btn-success" id="save-btn" onclick="saveData()">💾 Simpan</button>
      </div>
    </div>

    <!-- Guru & Tarikh -->
    <div class="toolbar">
      <div class="toolbar-group">
        <div class="field-group">
          <label>Guru Kelas</label>
          <input type="text" id="f-guru" placeholder="Nama guru kelas" value="${state.guruKelas}"
            style="width:220px" oninput="state.guruKelas=this.value;localStorage.setItem('hbp_guru',this.value)">
        </div>
        <div class="field-group">
          <label>Tarikh HBP</label>
          <input type="date" id="f-tarikh" value="${state.tarikh}"
            oninput="state.tarikh=this.value;localStorage.setItem('hbp_tarikh',this.value)">
        </div>
      </div>
    </div>

    <!-- Bulk Fill -->
    <div class="bulk-bar">
      <span>⚡ Isi Pukal:</span>
      <div class="bulk-fields">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:var(--sub);font-weight:600">Hadir:</span>
          <input type="number" id="bulk-hadir" placeholder="—" min="0" style="width:60px">
          <span style="color:var(--muted)">/</span>
          <input type="number" id="bulk-jumlah" placeholder="—" min="0" style="width:60px">
        </div>
        <div style="display:flex;gap:6px">
          <button class="sah-btn SB" onclick="bulkSahsiah('Sangat Baik')">Sangat Baik</button>
          <button class="sah-btn B"  onclick="bulkSahsiah('Baik')">Baik</button>
          <button class="sah-btn SD" onclick="bulkSahsiah('Sederhana')">Sederhana</button>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="bulkFillAll()">Terapkan Semua</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nama Murid</th>
            <th>Jantina</th>
            <th>Kehadiran (Hadir / Jumlah)</th>
            <th>Sahsiah</th>
            <th style="text-align:center">✓</th>
          </tr>
        </thead>
        <tbody id="murid-tbody">
          ${state.murid.map((m,i) => renderRow(m, i)).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderRow(m, i) {
  const e   = state.edits[m.nama] || {};
  const cls = sahsiahClass(e.sahsiah);
  const done = (e.hadirHari !== '' && e.jumlahHari !== '' && e.sahsiah) ? 'done' : '';
  return `
    <tr id="row-${i}">
      <td class="no">${i+1}</td>
      <td class="nama">${m.nama}</td>
      <td class="jantina">${m.jantina || '—'}</td>
      <td>
        <div class="hadir-cell">
          <input type="number" min="0" value="${e.hadirHari ?? ''}"
            oninput="setEdit(${i},'hadirHari',this.value)" placeholder="0">
          <span>/</span>
          <input type="number" min="0" value="${e.jumlahHari ?? ''}"
            oninput="setEdit(${i},'jumlahHari',this.value)" placeholder="0">
        </div>
      </td>
      <td>
        <div class="sahsiah-group">
          <button class="sah-btn SB ${cls==='SB'?'active':''}" onclick="setSahsiah(${i},'Sangat Baik')">Sangat Baik</button>
          <button class="sah-btn B  ${cls==='B' ?'active':''}" onclick="setSahsiah(${i},'Baik')">Baik</button>
          <button class="sah-btn SD ${cls==='SD'?'active':''}" onclick="setSahsiah(${i},'Sederhana')">Sederhana</button>
        </div>
      </td>
      <td class="status"><span class="status-dot ${done}" id="dot-${i}"></span></td>
    </tr>`;
}

function sahsiahClass(s) {
  if (!s) return '';
  const v = s.toLowerCase();
  if (v.includes('sangat')) return 'SB';
  if (v.includes('baik'))   return 'B';
  if (v.includes('sederhana')) return 'SD';
  return '';
}

// ── Edit Helpers ───────────────────────────────────────────
function setEdit(i, field, value) {
  const nama = state.murid[i].nama;
  state.edits[nama][field] = value;
  updateDot(i, nama);
}

function setSahsiah(i, value) {
  const nama = state.murid[i].nama;
  state.edits[nama].sahsiah = value;
  updateDot(i, nama);
  // re-render just buttons in that row
  const row = document.getElementById('row-'+i);
  const cls = sahsiahClass(value);
  row.querySelectorAll('.sah-btn').forEach(b => b.classList.remove('active'));
  row.querySelector('.sah-btn.' + cls)?.classList.add('active');
}

function updateDot(i, nama) {
  const e = state.edits[nama];
  const done = (e.hadirHari !== '' && e.jumlahHari !== '' && e.sahsiah);
  const dot = document.getElementById('dot-'+i);
  if (dot) dot.className = 'status-dot ' + (done ? 'done' : '');
}

// ── Bulk Fill ──────────────────────────────────────────────
let _bulkSahsiah = '';
function bulkSahsiah(v) { _bulkSahsiah = v; }

function bulkFillAll() {
  const hadir  = document.getElementById('bulk-hadir')?.value;
  const jumlah = document.getElementById('bulk-jumlah')?.value;

  state.murid.forEach((m, i) => {
    const e = state.edits[m.nama];
    if (hadir  !== '') e.hadirHari  = hadir;
    if (jumlah !== '') e.jumlahHari = jumlah;
    if (_bulkSahsiah)  e.sahsiah    = _bulkSahsiah;
  });

  // Re-render table body
  document.getElementById('murid-tbody').innerHTML =
    state.murid.map((m,i) => renderRow(m,i)).join('');
  toast('Nilai pukal telah diterapkan untuk semua murid.', 'success');
}

// ── Save ───────────────────────────────────────────────────
async function saveData() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  const payload = {
    kelas    : state.kelas,
    guruKelas: state.guruKelas,
    tarikh   : state.tarikh,
    murid    : state.murid.map(m => ({
      nama      : m.nama,
      hadirHari : state.edits[m.nama]?.hadirHari  ?? '',
      jumlahHari: state.edits[m.nama]?.jumlahHari ?? '',
      sahsiah   : state.edits[m.nama]?.sahsiah    || '',
    })),
  };

  const res = await api('saveRubrik', { data: payload });
  btn.disabled = false; btn.textContent = '💾 Simpan';

  if (res) {
    toast('Data berjaya disimpan ke Google Sheets! ✅', 'success');
    state.rubrik = {};
    state.murid.forEach(m => { state.rubrik[m.nama] = { ...state.edits[m.nama] }; });
    loadDashboard();
  }
}

// ── Print ──────────────────────────────────────────────────
function openPrint() {
  const pages = document.getElementById('print-pages');
  pages.innerHTML = state.murid.map(m => {
    const e = state.edits[m.nama] || {};
    const hadir  = e.hadirHari  ?? '00';
    const jumlah = e.jumlahHari ?? '00';
    const sah    = e.sahsiah || '';
    const SB = sah === 'Sangat Baik' ? '✓' : '';
    const B  = sah === 'Baik'        ? '✓' : '';
    const SD = sah === 'Sederhana'   ? '✓' : '';
    return `
      <div class="print-page">
        <div class="print-title">
          <p>DRAF RUBRIK UNTUK GURU KELAS</p>
          <p>UNTUK HARI BERTEMU PELANGGAN 2026</p>
        </div>
        <div class="print-meta">
          <div class="meta-row"><span class="label">NAMA MURID</span><span>:</span><span class="line" style="padding-left:8px">${m.nama}</span></div>
          <div class="meta-row"><span class="label">TAHUN</span><span>:</span><span class="line" style="padding-left:8px">3 / ${state.kelas}</span></div>
          <div class="meta-row"><span class="label">GURU KELAS</span><span>:</span><span class="line" style="padding-left:8px">${state.guruKelas}</span></div>
        </div>
        <table class="print-table">
          <tr>
            <th>KEHADIRAN</th>
            <td style="font-family:monospace;font-size:12pt">${hadir}/${jumlah}</td>
          </tr>
          <tr>
            <td colspan="2" class="full">SAHSIAH</td>
          </tr>
          <tr>
            <th>SANGAT BAIK</th>
            <td style="font-size:16pt">${SB}</td>
          </tr>
          <tr>
            <th>BAIK</th>
            <td style="font-size:16pt">${B}</td>
          </tr>
          <tr>
            <th>SEDERHANA</th>
            <td style="font-size:16pt">${SD}</td>
          </tr>
        </table>
      </div>`;
  }).join('');

  document.getElementById('print-area').classList.add('open');
}
function closePrint() { document.getElementById('print-area').classList.remove('open'); }

// ── Settings ───────────────────────────────────────────────
function openSettings() {
  document.getElementById('gas-url-input').value = state.gasUrl;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) { toast('URL tidak boleh kosong.','error'); return; }
  state.gasUrl = url;
  localStorage.setItem('hbp_gas_url', url);
  closeSettings();
  toast('URL berjaya disimpan! Memuatkan data...','success');
  loadDashboard();
}

// ── Helpers ────────────────────────────────────────────────
function setActive(btn) {
  document.querySelectorAll('.kelas-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

let _toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}
</script>
</body>
</html>
